<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Username</th>
        <th>Ciudad</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (customer of customers; track customer.id) {
        <tr>
          <td>{{ customer.id }}</td>
          <td>{{ customer.name }}</td>
          <td>{{ customer.username }}</td>
          <td>{{ customer.city }}</td>
          <td class="actions">
            <button class="btn-edit" (click)="onEdit(customer)">Editar</button>
            <button class="btn-delete" (click)="onDelete(customer.id!)">Eliminar</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
