<div class="modal-overlay">
  <div class="modal">
    <h2>{{ isEditing ? 'Editar cliente' : 'Nuevo cliente' }}</h2>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="form.name" name="name" #nameInput="ngModel" required placeholder="Nombre" [class.invalid]="nameInput.invalid && nameInput.touched" />
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="form.username" name="username" #usernameInput="ngModel" required placeholder="Username" [class.invalid]="usernameInput.invalid && usernameInput.touched" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="form.password" name="password" #passwordInput="ngModel" required placeholder="Password" [class.invalid]="passwordInput.invalid && passwordInput.touched" />
    </div>

    <div class="form-group">
      <label>Ciudad</label>
      <input type="text" [(ngModel)]="form.city" name="city" #cityInput="ngModel" required placeholder="Ciudad" [class.invalid]="cityInput.invalid && cityInput.touched" />
    </div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="onCancel()">Cancelar</button>
      <button class="btn-save" (click)="onSave(nameInput, usernameInput, passwordInput, cityInput)">Guardar</button>
    </div>
  </div>
</div>
